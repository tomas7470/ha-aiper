run_now:
    name: Start watering now
    description: >
        Trigger a one-off watering run on an IrriSense device by creating a
        scheduled task that fires in ~10 seconds. The Aiper cloud relays the
        command to the device over its existing MQTT shadow.
    fields:
        device_id:
            name: Aiper device
            description: The Aiper device to run.
            required: true
            selector:
                device:
                    integration: aiper
        duration:
            name: Duration (minutes)
            description: How long to run.
            required: true
            default: 10
            example: 10
            selector:
                number:
                    min: 1
                    max: 120
                    step: 1
                    unit_of_measurement: min
        region_id:
            name: Region (zone) id
            description: >
                For map-based devices (IrriSense 2.0), the region id within
                the saved map. Leave at 0 for the default region.
            required: false
            default: 0
            selector:
                number:
                    min: 0
                    max: 1000000000000000000
                    mode: box
        depth_mm:
            name: Target depth (mm)
            description: >
                Optional depth-based watering. Leave 0 for time-based.
            required: false
            default: 0
            selector:
                number:
                    min: 0
                    max: 50
                    step: 0.1
                    unit_of_measurement: mm
